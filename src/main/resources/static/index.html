<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academia — Student Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>

  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="brand-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </div>
        <span class="brand-name">Academia</span>
      </div>

      <nav class="sidebar__nav">
        <a href="#" class="nav-item nav-item--active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="#" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Students
        </a>
        <a href="#" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Courses
        </a>
        <a href="#" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Reports
        </a>
      </nav>

      <div class="sidebar__stats">
        <p class="stats-label">Overview</p>
        <div class="stat-card">
          <span class="stat-card__value" id="statTotal">—</span>
          <span class="stat-card__key">Total Students</span>
        </div>
        <div class="stat-card stat-card--accent">
          <span class="stat-card__value" id="statCourses">—</span>
          <span class="stat-card__key">Active Courses</span>
        </div>
      </div>

      <div class="sidebar__footer">
        <div class="avatar-row">
          <div class="avatar">A</div>
          <div class="avatar-info">
            <span class="avatar-name">Admin</span>
            <span class="avatar-role">System Manager</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar__left">
          <h1 class="page-title">Students</h1>
          <span class="page-breadcrumb">Dashboard / Students</span>
        </div>
        <div class="topbar__right">
          <button class="btn btn--ghost btn--icon" title="Notifications" aria-label="Notifications">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </button>
          <button class="btn btn--primary" id="openFormBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Student
          </button>
        </div>
      </header>

      <!-- Toast notification -->
      <div id="toast" class="toast" role="alert" aria-live="polite"></div>

      <!-- Content -->
      <div class="content">

        <!-- Search & filter row -->
        <div class="toolbar">
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="search-input" id="searchInput" type="text" placeholder="Search by name, email, or course…" />
          </div>
          <span class="record-count" id="recordCount">— students</span>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
          <table class="data-table" id="studentTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Student</th>
                <th>Email</th>
                <th>Age</th>
                <th>Course</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentTableBody">
              <!-- populated by JS -->
            </tbody>
          </table>

          <div class="empty-state" id="emptyState" hidden>
            <div class="empty-state__icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            </div>
            <p class="empty-state__title">No students yet</p>
            <p class="empty-state__sub">Add your first student to get started.</p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__header">
        <h2 class="modal__title" id="modalTitle">Add Student</h2>
        <button class="modal__close btn btn--ghost btn--icon" id="closeModalBtn" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="modal__body">
        <input type="hidden" id="studentId" />

        <div class="field-row">
          <div class="field">
            <label class="field__label" for="firstName">First Name <span class="required">*</span></label>
            <input class="field__input" type="text" id="firstName" placeholder="e.g. Aryan" required />
          </div>
          <div class="field">
            <label class="field__label" for="lastName">Last Name <span class="required">*</span></label>
            <input class="field__input" type="text" id="lastName" placeholder="e.g. Mehta" required />
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label class="field__label" for="email">Email <span class="required">*</span></label>
            <input class="field__input" type="email" id="email" placeholder="aryan@university.edu" required />
          </div>
          <div class="field">
            <label class="field__label" for="age">Age</label>
            <input class="field__input" type="number" id="age" placeholder="21" min="1" max="100" />
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="course">Course</label>
          <input class="field__input" type="text" id="course" placeholder="e.g. Computer Science" />
        </div>
      </div>

      <div class="modal__footer">
        <button class="btn btn--ghost" id="cancelBtn">Cancel</button>
        <button class="btn btn--primary" id="submitBtn">Add Student</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
